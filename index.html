<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchnicoVtuber | Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --twitch-purple: #9146FF;
            --accent-glow: #a970ff;
        }

        body {
            background-color: var(--bg-color);
            color: #eeeeee;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Header Styling */
        header {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 100%);
            box-sizing: border-box;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--twitch-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(145, 70, 255, 0.3);
        }
