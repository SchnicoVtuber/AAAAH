<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchnicoVtuber | Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --twitch-purple: #9146FF;
            --accent-glow: #a970ff;
        }

        body {
            background-color: var(--bg-color);
            color: #eeeeee;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Header Styling */
        header {
            text-align: center;
            padding: 60px 20px;
            width: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 100%);
            box-sizing: border-box;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--twitch-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(145, 70, 255, 0.3);
        }

        /* Die Karte mit lila Rand und Pulsieren */
        .animated-card {
            position: relative;
            background: var(--card-bg);
            border: 2px solid rgba(145, 70, 255, 0.4); 
            border-radius: 15px;
            margin: 20px 0;
            width: 90%;
            max-width: 800px;
            padding: 5px;
            animation: pulse-glow 4s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(145, 70, 255, 0.1);
            transition: transform 0.3s ease;
            box-sizing: border-box;
        }

        .animated-card:hover {
            transform: translateY(-5px);
            border-color: var(--twitch-purple);
        }

        .card-content {
            position: relative;
            width: 100%;
            padding: 15px;
            z-index: 2;
            box-sizing: border-box;
        }

        /* Pulsieren-Animation */
        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 10px rgba(145, 70, 255, 0.2);
                border-color: rgba(145, 70, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(145, 70, 255, 0.6); 
                border-color: rgba(145, 70, 255, 0.8);        
            }
            100% {
                box-shadow: 0 0 10px rgba(145, 70, 255, 0.2);
                border-color: rgba(145, 70, 255, 0.3);
            }
        }

        /* Status Anzeige */
        #status-indicator {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
